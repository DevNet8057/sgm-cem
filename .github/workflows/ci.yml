name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ── Type-check & Lint ───────────────────────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check API
        run: pnpm --filter api type-check

      - name: Type-check Web
        run: pnpm --filter web exec tsc --noEmit

  # ── API Tests ───────────────────────────────────────────────────────
  test-api:
    name: API tests
    runs-on: ubuntu-latest
    needs: typecheck

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: sgm_cem_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/sgm_cem_test
      NODE_ENV: test
      JWT_SECRET: ci-test-jwt-secret-at-least-256-bits-long-padding
      REFRESH_TOKEN_SECRET: ci-test-refresh-secret
      CSRF_SECRET: ci-test-csrf-secret
      API_URL: http://localhost:3001
      APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        # Skip Chromium download — tests only check route guards, no PDF generation
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: pnpm install --frozen-lockfile

      - name: Push Prisma schema to test DB
        working-directory: apps/api
        run: pnpm prisma db push --accept-data-loss

      - name: Run API tests
        working-directory: apps/api
        run: pnpm test

  # ── Web Build ───────────────────────────────────────────────────────
  build-web:
    name: Web build
    runs-on: ubuntu-latest
    needs: typecheck

    env:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: dummy-google-client-id-for-build

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        working-directory: apps/web
        run: pnpm build

  # ── API Build ───────────────────────────────────────────────────────
  build-api:
    name: API build
    runs-on: ubuntu-latest
    needs: test-api

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        working-directory: apps/api
        run: pnpm build
