# ──────────────────────────────────────────────────────────────────────
# DOCKER-COMPOSE — Orchestration complète du projet
#
# Services :
#   • postgres  → Base de données PostgreSQL 15
#   • redis     → Cache / BullMQ
#   • api       → Backend Express (port 3001)
#   • web       → Frontend Next.js (port 3000)
#
# Pourquoi Docker Compose ?
#   • Lance tous les services en une seule commande
#   • Crée un réseau privé entre les conteneurs
#   • Gère les volumes pour la persistance (postgres)
#   • Gère les dépendances au démarrage (order: api/web après db/redis)
# ──────────────────────────────────────────────────────────────────────

services:
  # ── BDD PostgreSQL 15 ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sgm_cem
    ports:
      - "5432:5432"
    volumes:
      # Volume nommé = persiste les données entre redémarrages
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # Vérifie que PostgreSQL est prêt à accepter des connexions
      test: ["CMD-SHELL", "pg_isready -U postgres -d sgm_cem"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgm-net

  # ── Redis 7 Alpine ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      # Redis répond ping quand il est prêt
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgm-net

  # ── API Backend Express ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      # Tout ce qui DOIT être configuré pour l'API
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sgm_cem
      REDIS_URL: redis://redis:6379
      PORT: 3001
      APP_URL: http://localhost:3000
      API_URL: http://localhost:3001
      YELII_API_KEY: ${YELII_API_KEY}
      YELII_WEBHOOK_SECRET: ${YELII_WEBHOOK_SECRET}
      YELII_BASE_URL: ${YELII_BASE_URL}
    env_file:
      - .env
    # Monter le dossier uploads pour que les fichiers persistents (S3 hors prod)
    volumes:
      - ./apps/api/uploads:/app/apps/api/uploads
    networks:
      - sgm-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health',(r)=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Web Frontend Next.js ────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Les NEXT_PUBLIC_* sont figées dans le bundle AU BUILD (pas à l'exécution).
        # GOOGLE_CLIENT_ID est lu depuis le .env racine (interpolation compose).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: always
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    networks:
      - sgm-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000',(r)=>{process.exit(r.statusCode<500?0:1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Volumes pour la persistance ──────────────────────────────────────
volumes:
  pgdata:
    # Stocke toutes les tables PostgreSQL
  redisdata:
    # Stocke le cache Redis

  # ── Réseau privé ────────────────────────────────────────────────────
  # Les conteneurs peuvent se parler par leur nom de service
  # ex: l'API peut accéder à postgres:5432, redis:6379
networks:
  sgm-net:
    driver: bridge
